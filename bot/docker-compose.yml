# Bot живёт НЕ на homeserver, а на отдельном хосте (debianOCR), потому что
# на homeserver-провайдере заблокирован api.telegram.org. К Postgres ходит
# через SSH-туннель (saiga-tunnel sidecar) — см. tunnel/.
#
# Build context = root репо, чтобы захватить shared/.
services:
  saiga-tunnel:
    build:
      context: ./tunnel
    image: saiga-tunnel:latest
    container_name: saiga-tunnel
    restart: unless-stopped
    networks:
      - saiga-bot-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5432"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  saiga-bot-redis:
    image: redis:7.0-alpine
    container_name: saiga-bot-redis
    restart: unless-stopped
    volumes:
      - bot-redis-data:/data
    networks:
      - saiga-bot-net

  saiga-telegram-bot:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    image: saiga-bot:latest
    container_name: saiga-telegram-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-logs:/app/logs
      - bot-data:/app/data    # локальные временные файлы (PDF/voice — не БД)
    networks:
      - saiga-bot-net
    depends_on:
      saiga-tunnel:
        condition: service_healthy
      saiga-bot-redis:
        condition: service_started

volumes:
  bot-logs:
  bot-data:
  bot-redis-data:

networks:
  saiga-bot-net:
    name: saiga-bot-net
