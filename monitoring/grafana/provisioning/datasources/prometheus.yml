# Grafana datasource provisioning.
# Файл читается при старте: автоматически создаётся datasource Prometheus,
# чтобы не настраивать руками через UI.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy           # Grafana ходит к Prometheus сама, не браузер юзера
    url: http://prometheus:9090
    isDefault: true
    editable: false         # запретим менять через UI — конфиг через git
