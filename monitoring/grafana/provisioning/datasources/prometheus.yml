# Grafana datasource provisioning.
# Файл читается при старте: автоматически создаётся datasource Prometheus.
# uid: prometheus — фиксируем явно, чтобы dashboards могли ссылаться predictable.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
