{% extends 'layout.html' %}
{% set simple_layout = true %}
{% block title %}{{ error_code }}{% endblock %}
{% block simple %}
<div class="auth-card" style="text-align:center;">
    <h1 style="font-size:48px; margin-bottom:8px;">{{ error_code }}</h1>
    <p class="sub">{{ error_message }}</p>
    <a href="{{ url_for('index') }}" class="btn full">На главную</a>
</div>
{% endblock %}
