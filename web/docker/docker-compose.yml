services:
  saiga-web-app:
    build: ../backend
    image: saiga-web:latest
    container_name: saiga-web-app
    restart: unless-stopped
    env_file: ../.env
    environment:
      - LLM_API_URL=http://saiga-llm:5000/v1/chat/completions
    networks:
      - nginx-proxy        # Caddy → web
      - saiga-internal     # web → postgres
    # depends_on не используем — postgres в отдельном compose-проекте.
    # Запуск: сначала ~/projects/saiga/postgres, потом web.

networks:
  # Caddy <-> web
  nginx-proxy:
    external: true
  # web <-> postgres (создаётся в postgres/docker-compose.yml)
  saiga-internal:
    external: true
