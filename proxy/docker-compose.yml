services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /home/denciao/projects/vaibkod-landing/site:/srv/landing:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - default

volumes:
  caddy-data:
  caddy-config:

networks:
  default:
    name: nginx-proxy
    external: true
