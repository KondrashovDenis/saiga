services:
  saiga:
    image: llm-docker-saiga:latest
    pull_policy: never
    container_name: saiga-llm
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./models:/app/models
    networks:
      - default
    shm_size: '64gb'
    ports:
      - "7860:7860"
      - "5000:5000"
    # Образ был собран с симлинком на CUDA stub-библиотеку (для линковки),
    # которая мешает рантайму. Удаляем перед стартом, чтобы ldconfig резолвил
    # реальный libcuda.so.1, проброшенный nvidia-container-toolkit.
    # См. README раздел "Пересборка LLM-образа" — в новом Dockerfile эту строку
    # надо убрать совсем.
    entrypoint:
      - /bin/bash
      - -c
      - 'rm -f /usr/local/cuda/lib64/libcuda.so.1 && ldconfig && exec /opt/nvidia/nvidia_entrypoint.sh "$$@"'
      - --
    command:
      - python
      - server.py
      - --model-dir
      - ./models/saiga
      - --model
      - saiga_nemo_12b.Q4_K_M.gguf
      - --listen
      - --api
      - --flash-attn
      - --threads
      - "10"
      - --threads-batch
      - "14"
      - --cfg-cache
      - --mlock
      - --no-mmap
      - --n-gpu-layers
      - "999"

networks:
  default:
    name: nginx-proxy
    external: true
