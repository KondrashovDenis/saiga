services:
  saiga:
    # Имя образа сохранено — текущий running container продолжит жить, пока
    # не сделают явный rebuild:
    #   cd ~/projects/saiga/llm
    #   docker compose build
    #   docker compose up -d --force-recreate
    # Build context = llm/, чтобы submodule text-generation-webui/ попал в образ.
    image: llm-docker-saiga:latest
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    container_name: saiga-llm
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./models:/app/models
    networks:
      - default
    shm_size: '64gb'
    # ports НЕ публикуются на хост — Caddy ходит к saiga-llm:5000 и :7860
    # через docker network nginx-proxy. Публикация на 0.0.0.0 обходила бы
    # Caddy auth для всех в LAN (Docker bypass UFW). Внутри сети контейнеры
    # друг друга видят по имени без публикации.
    expose:
      - "5000"
      - "7860"
    # Stub-симлинк на libcuda.so убран из Dockerfile — entrypoint-костыль больше
    # не нужен. Запуск идёт через стандартный nvidia_entrypoint.sh из base-образа,
    # CMD задаётся ниже.
    command:
      - python
      - server.py
      - --model-dir
      - ./models/saiga
      - --model
      - saiga_nemo_12b.Q4_K_M.gguf
      - --listen
      - --api
      - --flash-attn
      - --threads
      - "10"
      - --threads-batch
      - "14"
      - --cfg-cache
      - --mlock
      - --no-mmap
      - --n-gpu-layers
      - "999"

networks:
  default:
    name: nginx-proxy
    external: true
